<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 背景圆形 -->
  <circle cx="32" cy="32" r="30" fill="#f6f7f9"/>

  <!-- 左侧文字块 -->
  <rect x="6" y="26" width="16" height="12" rx="3" fill="#14233c"/>

  <!-- 右侧文字块 -->
  <rect x="42" y="26" width="16" height="12" rx="3" fill="#1f7aff"/>

  <!-- 左箭头 -->
